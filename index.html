<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://drive.google.com/thumbnail?id=1He_LKrgr6fUweKUlRX02hNQ45a8QAD-W&sz=w64" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecoverX Technologies</title>
    <!-- Tailwind CSS CDN with custom brand config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                blue: '#38b6ff',
                dark: '#0f172a',
                light: '#f8fafc',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          },
        },
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@700&family=Questrial&display=swap" rel="stylesheet">
    <script src="https://web3forms.com/client/script.js" async defer></script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      #loader {
        position: fixed;
        inset: 0;
        background-color: #0f172a;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease-out, visibility 0.5s;
      }
      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .loader-icon {
        font-family: 'Orbitron', sans-serif;
        font-size: 80px;
        font-weight: bold;
        color: #38b6ff;
        line-height: 1;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .7; transform: scale(1.05); }
      }
      .loader-hidden {
        opacity: 0;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="loader-content">
        <span class="loader-icon">X</span>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('loader');
        if (loader) {
          setTimeout(() => {
            loader.classList.add('loader-hidden');
          }, 1000);
        }
      });
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
